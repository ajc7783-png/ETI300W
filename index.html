<!DOCTYPE html>
<html>
<head>
    <title>Netflix Data</title>
</head>
<body>

<h1>Movie List</h1>

<button onclick="getData()">Load Movies</button>

<div id="output"></div>

<script>
function getData() {
    fetch("http://34.207.60.47/api.php")
    .then(response => response.json())
    .then(data => {
        let output = "";
	output.innerHTML = "";

        data.forEach(movie => {
            output += movie.name + " - " + movie.genre + "<br>";
        });
        document.getElementById("output").innerHTML = output;
    });
}
</script>

</body>
</html>
